<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPU Product - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<button class="hamburger-toggle" type="button" aria-label="Open menu">
  <span></span>
  <span></span>
  <span></span>
</button>

<a href="cart.html" class="nav-cart-link" aria-label="Cart">
  <img src="cart-icon.png" alt="Cart">
  <span class="nav-cart-count">0</span>
</a>

<div class="nav-menu-overlay">
  <div class="nav-menu-panel nav-menu-main active">
    <div class="nav-menu-links">
      <a href="index.html" class="nav-menu-link">Home</a>
      <a href="signature-builds.html" class="nav-menu-link">Signature Builds</a>
      <button class="nav-menu-button" type="button" id="open-components-menu">Components</button>
      <a href="consultation.html" class="nav-menu-link">Need a Custom PC?</a>
    </div>
  </div>

  <div class="nav-menu-panel nav-menu-components">
    <div class="nav-menu-links">
      <button class="nav-menu-back" type="button" id="back-to-main-menu">Back</button>
      <a href="cpus.html" class="nav-menu-link">CPU</a>
      <a href="cpu-coolers.html" class="nav-menu-link">CPU Cooler</a>
      <a href="motherboards.html" class="nav-menu-link">Motherboard</a>
      <a href="memory.html" class="nav-menu-link">Memory</a>
      <a href="storage.html" class="nav-menu-link">Storage</a>
      <a href="graphics-cards.html" class="nav-menu-link">Graphics Card</a>
      <a href="cases.html" class="nav-menu-link">Case</a>
      <a href="power-supplies.html" class="nav-menu-link">Power Supply</a>
      <a href="monitors.html" class="nav-menu-link">Monitor</a>
    </div>
  </div>
</div>

<main class="product-detail-page">
  <section class="product-detail-layout">
    <div class="product-gallery">
      <div class="product-main-image-frame">
        <button class="product-gallery-arrow product-gallery-arrow-left" type="button">‹</button>
        <img id="product-main-image" src="" alt="">
        <button class="product-gallery-arrow product-gallery-arrow-right" type="button">›</button>
      </div>

      <div class="product-thumbnails" id="product-thumbnails"></div>
    </div>

    <aside class="product-detail-info">
      <p class="product-detail-eyebrow" id="product-brand"></p>
      <h1 id="product-name"></h1>
      <p class="product-model" id="product-model"></p>

      <div class="product-detail-price" id="product-price"></div>

      <div class="product-specs-list" id="product-specs"></div>

      <button class="product-add-cart-button" type="button">
        Add to Cart
      </button>
    </aside>
  </section>
</main>

<script src="gpu-products.js"></script>

<script>
  const params = new URLSearchParams(window.location.search);
  const productSlug = params.get("product") || gpuProducts[0].slug;
  const product = gpuProducts.find((item) => item.slug === productSlug) || gpuProducts[0];

  let currentImageIndex = 0;

  const mainImage = document.getElementById("product-main-image");
  const thumbnailsContainer = document.getElementById("product-thumbnails");

  document.title = product.name + " - The Computer Shop";

  document.getElementById("product-brand").textContent = product.brand;
  document.getElementById("product-name").textContent = product.name;
  document.getElementById("product-model").textContent = product.model;
  document.getElementById("product-price").textContent = product.price;

  document.getElementById("product-specs").innerHTML = product.specs
    .map((spec) => `<div class="product-spec-item">${spec}</div>`)
    .join("");

  function renderImage() {
    mainImage.src = product.images[currentImageIndex];
    mainImage.alt = product.name;

    document.querySelectorAll(".product-thumbnail").forEach((thumbnail, index) => {
      thumbnail.classList.toggle("active", index === currentImageIndex);
    });
  }

  thumbnailsContainer.innerHTML = product.images
    .map((image, index) => `
      <button class="product-thumbnail" type="button" data-index="${index}">
        <img src="${image}" alt="${product.name} image ${index + 1}">
      </button>
    `)
    .join("");

  document.querySelectorAll(".product-thumbnail").forEach((thumbnail) => {
    thumbnail.addEventListener("click", () => {
      currentImageIndex = Number(thumbnail.dataset.index);
      renderImage();
    });
  });

  document.querySelector(".product-gallery-arrow-left").addEventListener("click", () => {
    currentImageIndex = (currentImageIndex - 1 + product.images.length) % product.images.length;
    renderImage();
  });

  document.querySelector(".product-gallery-arrow-right").addEventListener("click", () => {
    currentImageIndex = (currentImageIndex + 1) % product.images.length;
    renderImage();
  });

  renderImage();

  const menuButton = document.querySelector(".hamburger-toggle");
  const mainMenu = document.querySelector(".nav-menu-main");
  const componentsMenu = document.querySelector(".nav-menu-components");
  const openComponentsButton = document.getElementById("open-components-menu");
  const backButton = document.getElementById("back-to-main-menu");

  if (menuButton && mainMenu && componentsMenu && openComponentsButton && backButton) {
    menuButton.addEventListener("click", () => {
      document.body.classList.toggle("nav-menu-open");
      mainMenu.classList.add("active");
      componentsMenu.classList.remove("active");
    });

    openComponentsButton.addEventListener("click", () => {
      mainMenu.classList.remove("active");
      componentsMenu.classList.add("active");
    });

    backButton.addEventListener("click", () => {
      componentsMenu.classList.remove("active");
      mainMenu.classList.add("active");
    });
  }
</script>

</body>
</html>
