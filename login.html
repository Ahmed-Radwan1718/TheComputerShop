<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body oncontextmenu="return false;">

<div id="site-header-root"></div>
<script src="site-header.js"></script>

<main class="auth-page">
  <section class="auth-section">
    <div class="auth-section-inner">
      <div class="auth-section-header">
        <h1 class="auth-section-title">Log In</h1>
        <p class="auth-section-intro">
          Log in to manage your account details, saved address, order history, and support requests.
        </p>
      </div>

      <div class="auth-panel">
        <form class="auth-form" id="login-form">
          <div class="auth-field">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" autocomplete="email" required>
          </div>

          <div class="auth-field auth-password-field">
            <label for="login-password">Password</label>

            <div class="auth-password-input-wrap">
              <input type="password" id="login-password" autocomplete="current-password" required>

              <button class="auth-password-visibility-toggle password-hidden" type="button" data-target="login-password" aria-label="Show password">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 5C6 5 2.1 9.6 1 12c1.1 2.4 5 7 11 7s9.9-4.6 11-7c-1.1-2.4-5-7-11-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-2.2a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6Z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="auth-login-options">
            <button class="auth-button" type="submit" id="login-submit">
              Log In
            </button>

            <div class="auth-divider"><span>or</span></div>

            <button class="auth-passwordless-button" type="button" id="login-passwordless-button">
              Email Me a Sign-In Code
            </button>
          </div>

          <p class="auth-message" id="login-message" aria-live="polite"></p>
        </form>

        <div class="auth-panel-footer">
          <span>Forgot your password?</span>
          <a href="forgot-password.html">Reset Password</a>
        </div>

        <div class="auth-panel-footer">
          <span>Do not have an account?</span>
          <a href="signup.html">Create Account</a>
        </div>
      </div>
    </div>
  </section>
</main>

<div class="auth-two-factor-panel" id="login-two-factor-panel" hidden>
  <div class="auth-two-factor-card">
    <div class="auth-two-factor-header">
      <p class="auth-two-factor-eyebrow">Two-Factor Authentication</p>
      <h2 id="login-two-factor-title">Enter Verification Code</h2>
      <p id="login-two-factor-text">Enter the code required to finish signing in.</p>
    </div>

    <form class="auth-form" id="login-two-factor-form">
      <div class="auth-field">
        <label>Verification Code</label>

        <div class="auth-two-factor-code-inputs" aria-label="Verification code">
          <input class="auth-two-factor-code-input" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" data-login-two-factor-input aria-label="Digit 1">
          <input class="auth-two-factor-code-input" type="text" inputmode="numeric" maxlength="1" data-login-two-factor-input aria-label="Digit 2">
          <input class="auth-two-factor-code-input" type="text" inputmode="numeric" maxlength="1" data-login-two-factor-input aria-label="Digit 3">
          <input class="auth-two-factor-code-input" type="text" inputmode="numeric" maxlength="1" data-login-two-factor-input aria-label="Digit 4">
          <input class="auth-two-factor-code-input" type="text" inputmode="numeric" maxlength="1" data-login-two-factor-input aria-label="Digit 5">
          <input class="auth-two-factor-code-input" type="text" inputmode="numeric" maxlength="1" data-login-two-factor-input aria-label="Digit 6">
        </div>
      </div>

      <label class="auth-trust-device-option">
        <input type="checkbox" id="login-trust-device">
        <span>Trust this device</span>
      </label>

      <button class="auth-button" type="submit" id="login-two-factor-submit">
        Continue
      </button>

      <button class="auth-two-factor-link-button" type="button" id="login-use-email-code" hidden>
        Lost access to your authenticator app? Use email instead.
      </button>

      <button class="auth-two-factor-link-button muted" type="button" id="login-two-factor-cancel">
        Cancel sign in
      </button>

      <p class="auth-message" id="login-two-factor-message" aria-live="polite"></p>
    </form>
  </div>
</div>

<script>

  const loginForm = document.getElementById("login-form");
  const loginButton = document.getElementById("login-submit");
  const passwordlessLoginButton = document.getElementById("login-passwordless-button");
  const loginMessage = document.getElementById("login-message");
  const passwordVisibilityToggles = document.querySelectorAll(".auth-password-visibility-toggle");

  const twoFactorPanel = document.getElementById("login-two-factor-panel");
  const twoFactorForm = document.getElementById("login-two-factor-form");
  const twoFactorTitle = document.getElementById("login-two-factor-title");
  const twoFactorText = document.getElementById("login-two-factor-text");
  const twoFactorCodeInputs = Array.from(document.querySelectorAll("[data-login-two-factor-input]"));
  const twoFactorSubmit = document.getElementById("login-two-factor-submit");
  const twoFactorMessage = document.getElementById("login-two-factor-message");
  const useEmailCodeButton = document.getElementById("login-use-email-code");
  const twoFactorCancelButton = document.getElementById("login-two-factor-cancel");
  const trustDeviceCheckbox = document.getElementById("login-trust-device");

  let pendingTwoFactorSettings = {};
  let pendingMaskedEmail = "";
  let activeTwoFactorMethod = "";
  let twoFactorFlowActive = false;

  const pendingTwoFactorKey = "tcs-login-2fa-pending";
  const loginNoticeKey = "tcs-login-message";

  function showMessage(message, type) {
    loginMessage.textContent = message;
    loginMessage.className = "auth-message";

    if (type) {
      loginMessage.classList.add(type);
    }
  }

  const savedLoginNotice = sessionStorage.getItem(loginNoticeKey);

  if (savedLoginNotice) {
    sessionStorage.removeItem(loginNoticeKey);
    showMessage(savedLoginNotice, "error");
  }

  function showTwoFactorMessage(message, type) {
    twoFactorMessage.textContent = message;
    twoFactorMessage.className = "auth-message";

    if (type) {
      twoFactorMessage.classList.add(type);
    }
  }

  function markTwoFactorPending() {
    sessionStorage.setItem(pendingTwoFactorKey, "1");
  }

  function clearTwoFactorPending() {
    sessionStorage.removeItem(pendingTwoFactorKey);
    twoFactorFlowActive = false;
  }

  function getLoginRedirectTarget() {
    const savedRedirect = localStorage.getItem("tcs-login-redirect");

    if (savedRedirect) {
      localStorage.removeItem("tcs-login-redirect");
      return savedRedirect;
    }

    return "index.html";
  }

  function finishLogin() {
    clearTwoFactorPending();
    showTwoFactorMessage("Logged in successfully.", "success");

    setTimeout(function () {
      window.location.href = getLoginRedirectTarget();
    }, 700);
  }

  function clearTwoFactorCodeInputs() {
    twoFactorCodeInputs.forEach(function (input) {
      input.value = "";
    });
  }

  function getTwoFactorCodeValue() {
    return twoFactorCodeInputs.map(function (input) {
      return input.value.trim();
    }).join("");
  }

  function focusFirstTwoFactorCodeInput() {
    if (twoFactorCodeInputs[0]) {
      twoFactorCodeInputs[0].focus();
    }
  }

  function openTwoFactorPanel(method) {
    activeTwoFactorMethod = method;
    twoFactorFlowActive = true;
    markTwoFactorPending();
    clearTwoFactorCodeInputs();
    showTwoFactorMessage("", "");

    if (trustDeviceCheckbox) {
      trustDeviceCheckbox.checked = false;
    }

    loginForm.hidden = true;
    twoFactorForm.hidden = false;

    document.querySelectorAll(".auth-panel-footer").forEach(function (footer) {
      footer.hidden = true;
    });

    twoFactorPanel.hidden = false;

    if (method === "app") {
      twoFactorTitle.textContent = "Enter Authenticator Code";
      twoFactorText.textContent = "Open your authenticator app and enter the 6-digit code for The Computer Shop.";
      useEmailCodeButton.hidden = !pendingTwoFactorSettings.email;
    } else {
      twoFactorTitle.textContent = "Check Your Email";
      twoFactorText.textContent = "Enter the 6-digit code sent to " + (pendingMaskedEmail || "your email") + ".";
      useEmailCodeButton.hidden = true;
    }

    setTimeout(function () {
      focusFirstTwoFactorCodeInput();
    }, 50);
  }

  async function sendLoginEmailCode(email) {
    const requestBody = {};
    const cleanEmail = String(email || "").trim();

    if (cleanEmail) {
      requestBody.email = cleanEmail;
    }

    const response = await fetch("/api/login-send-email-code", {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(requestBody)
    });

    const data = await response.json().catch(function () {
      return {};
    });

    if (!response.ok) {
      throw new Error(data.error || "Could not send email code.");
    }

    return data;
  }

  function shouldTrustDevice() {
    return Boolean(trustDeviceCheckbox && trustDeviceCheckbox.checked);
  }

  async function verifyEmailLoginCode(code) {
    const response = await fetch("/api/login-verify-email-code", {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        code: code,
        trustDevice: shouldTrustDevice()
      })
    });

    const data = await response.json().catch(function () {
      return {};
    });

    if (!response.ok) {
      throw new Error(data.error || "The email code is incorrect.");
    }

    return data;
  }

  async function verifyAppLoginCode(code) {
    const response = await fetch("/api/login-verify-authenticator", {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        code: code,
        trustDevice: shouldTrustDevice()
      })
    });

    const data = await response.json().catch(function () {
      return {};
    });

    if (!response.ok) {
      throw new Error(data.error || "The authenticator code is incorrect.");
    }

    return data;
  }

  async function cancelServerLogin() {
    await fetch("/api/logout", {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({})
    }).catch(function () {});
  }

  passwordVisibilityToggles.forEach(function (toggleButton) {
    const targetId = toggleButton.getAttribute("data-target");
    const targetInput = document.getElementById(targetId);

    if (targetInput && targetInput.type === "password") {
      toggleButton.classList.add("password-hidden");
      toggleButton.classList.remove("password-visible");
    }

    toggleButton.addEventListener("click", function () {
      const targetId = toggleButton.getAttribute("data-target");
      const targetInput = document.getElementById(targetId);

      if (!targetInput) {
        return;
      }

      if (targetInput.type === "password") {
        targetInput.type = "text";
        toggleButton.classList.remove("password-hidden");
        toggleButton.classList.add("password-visible");
        toggleButton.setAttribute("aria-label", "Hide password");
      } else {
        targetInput.type = "password";
        toggleButton.classList.add("password-hidden");
        toggleButton.classList.remove("password-visible");
        toggleButton.setAttribute("aria-label", "Show password");
      }
    });
  });

  function setPrimaryLoginControlsDisabled(disabled) {
    loginButton.disabled = disabled;

    if (passwordlessLoginButton) {
      passwordlessLoginButton.disabled = disabled;
    }
  }

  async function startPasswordlessLogin() {
    const emailInput = document.getElementById("login-email");
    const email = emailInput.value.trim();

    if (!email) {
      showMessage("Please enter your email address first.", "error");
      emailInput.focus();
      return;
    }

    setPrimaryLoginControlsDisabled(true);
    passwordlessLoginButton.textContent = "Sending Code...";
    showMessage("", "");

    try {
      const data = await sendLoginEmailCode(email);

      pendingTwoFactorSettings = data.methods || {
        app: false,
        email: true
      };
      pendingMaskedEmail = data.maskedEmail || email;

      openTwoFactorPanel("email");
      showTwoFactorMessage("If an account exists with that email, a code has been sent.", "success");
    } catch (error) {
      clearTwoFactorPending();
      await cancelServerLogin();
      showMessage(error.message || "Could not send a sign-in code. Please try again.", "error");
    } finally {
      setPrimaryLoginControlsDisabled(false);
      passwordlessLoginButton.textContent = "Email Me a Sign-In Code";
    }
  }

  loginForm.addEventListener("submit", async function (event) {
    event.preventDefault();

    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;

    setPrimaryLoginControlsDisabled(true);
    loginButton.textContent = "Logging In...";
    showMessage("", "");

    try {
      const response = await fetch("/api/login", {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      });

      const data = await response.json().catch(function () {
        return {};
      });

      if (!response.ok) {
        throw new Error(data.error || "Incorrect email or password.");
      }

      if (data.requiresTwoFactor) {
        pendingTwoFactorSettings = data.methods || {};
        pendingMaskedEmail = data.maskedEmail || "";

        if (pendingTwoFactorSettings.app) {
          openTwoFactorPanel("app");
          showMessage("", "");
          return;
        }

        if (pendingTwoFactorSettings.email) {
          const emailCodeData = await sendLoginEmailCode();
          pendingMaskedEmail = emailCodeData.maskedEmail || pendingMaskedEmail;
          openTwoFactorPanel("email");
          showMessage("", "");
          showTwoFactorMessage("Email code sent.", "success");
          return;
        }

        throw new Error("No two-factor method is available.");
      }

      showMessage("Logged in successfully.", "success");

      setTimeout(function () {
        window.location.href = getLoginRedirectTarget();
      }, 800);
    } catch (error) {
      clearTwoFactorPending();
      cancelServerLogin();

      showMessage(error.message || "Something went wrong. Please try again.", "error");
    } finally {
      setPrimaryLoginControlsDisabled(false);
      loginButton.textContent = "Log In";
    }
  });

  if (passwordlessLoginButton) {
    passwordlessLoginButton.addEventListener("click", startPasswordlessLogin);
  }

  twoFactorCodeInputs.forEach(function (input, index) {
    input.addEventListener("input", function () {
      input.value = input.value.replace(/\D/g, "").slice(0, 1);

      if (input.value && twoFactorCodeInputs[index + 1]) {
        twoFactorCodeInputs[index + 1].focus();
      }
    });

    input.addEventListener("keydown", function (event) {
      if (event.key === "Backspace" && !input.value && twoFactorCodeInputs[index - 1]) {
        twoFactorCodeInputs[index - 1].focus();
      }
    });

    input.addEventListener("paste", function (event) {
      const pastedCode = event.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);

      if (!pastedCode) {
        return;
      }

      event.preventDefault();

      twoFactorCodeInputs.forEach(function (codeInput, codeIndex) {
        codeInput.value = pastedCode.charAt(codeIndex) || "";
      });

      const focusIndex = Math.min(pastedCode.length, twoFactorCodeInputs.length) - 1;

      if (twoFactorCodeInputs[focusIndex]) {
        twoFactorCodeInputs[focusIndex].focus();
      }
    });
  });

  twoFactorForm.addEventListener("submit", async function (event) {
    event.preventDefault();

    const code = getTwoFactorCodeValue();

    if (code.length !== 6) {
      showTwoFactorMessage("Please enter the 6-digit code.", "error");
      return;
    }

    twoFactorSubmit.disabled = true;
    twoFactorSubmit.textContent = "Verifying...";
    showTwoFactorMessage("", "");

    try {
      let data = {};

      if (activeTwoFactorMethod === "app") {
        data = await verifyAppLoginCode(code);
      } else {
        data = await verifyEmailLoginCode(code);
      }

      if (data.requiresTwoFactor && data.methods && data.methods.app) {
        pendingTwoFactorSettings = {
          app: true,
          email: false
        };
        pendingMaskedEmail = data.maskedEmail || pendingMaskedEmail;
        openTwoFactorPanel("app");
        showTwoFactorMessage("Email verified. Enter your authenticator app code to finish signing in.", "success");
        return;
      }

      finishLogin();
    } catch (error) {
      showTwoFactorMessage(error.message || "The code is incorrect.", "error");
      clearTwoFactorCodeInputs();
      focusFirstTwoFactorCodeInput();
    } finally {
      twoFactorSubmit.disabled = false;
      twoFactorSubmit.textContent = "Continue";
    }
  });

  useEmailCodeButton.addEventListener("click", async function () {
    useEmailCodeButton.disabled = true;
    useEmailCodeButton.textContent = "Sending email code...";
    showTwoFactorMessage("", "");

    try {
      const data = await sendLoginEmailCode();
      pendingMaskedEmail = data.maskedEmail || pendingMaskedEmail;
      openTwoFactorPanel("email");
      showTwoFactorMessage("Email code sent.", "success");
    } catch (error) {
      showTwoFactorMessage(error.message || "Could not send email code.", "error");
    } finally {
      useEmailCodeButton.disabled = false;
      useEmailCodeButton.textContent = "Lost access to your authenticator app? Use email instead.";
    }
  });

  twoFactorCancelButton.addEventListener("click", async function () {
    clearTwoFactorPending();
    await cancelServerLogin();
    pendingTwoFactorSettings = {};
    pendingMaskedEmail = "";
    activeTwoFactorMethod = "";
    twoFactorPanel.hidden = true;
    twoFactorForm.hidden = false;
    loginForm.hidden = false;

    document.querySelectorAll(".auth-panel-footer").forEach(function (footer) {
      footer.hidden = false;
    });

    showTwoFactorMessage("", "");
    showMessage("Sign in cancelled.", "error");
  });
</script>

<script>
  document.addEventListener("keydown", function (event) {
    if (
      event.key === "F12" ||
      (event.ctrlKey && event.shiftKey && ["I", "J", "C"].includes(event.key.toUpperCase())) ||
      (event.ctrlKey && event.key.toUpperCase() === "U") ||
      (event.metaKey && event.altKey && ["I", "J", "C"].includes(event.key.toUpperCase()))
    ) {
      event.preventDefault();
      return false;
    }
  });
</script>

</body>
</html>
