<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body oncontextmenu="return false;">

<header class="site-header">
  <a href="index.html" class="site-header-logo">The Computer Shop</a>

  <nav class="site-header-nav" aria-label="Main navigation">
    <a href="signature-builds.html">Signature Builds</a>
    <a href="components.html">Components</a>
    <a href="consultation.html">Need a Custom PC?</a>
  </nav>

  <a href="cart.html" class="site-header-cart" aria-label="Cart">
    <img src="cart-icon.png" alt="Cart">
    <span class="nav-cart-count">0</span>
  </a>

  <button class="hamburger-toggle" type="button" aria-label="Open menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<main class="auth-page">
  <section class="auth-shell">
    <div class="auth-card">
      <p class="auth-eyebrow">Account</p>
      <h1 class="auth-title">Log In</h1>
      <p class="auth-subtitle">Log in to manage your account and future orders.</p>

      <form id="login-form" class="auth-form">
        <label class="auth-field">
          <span class="auth-label">Email</span>
          <input id="login-email" class="auth-input" type="email" required autocomplete="email">
        </label>

        <label class="auth-field">
          <span class="auth-label">Password</span>
          <input id="login-password" class="auth-input" type="password" required autocomplete="current-password">
        </label>

        <div class="auth-link-row">
          <a href="forgot-password.html">Forgot password?</a>
        </div>

        <button id="login-button" class="auth-button" type="submit">
          Log In
        </button>

        <p id="login-message" class="auth-message"></p>
      </form>

      <p class="auth-switch">
        Don’t have an account?
        <a href="signup.html">Create account</a>
      </p>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
  const loginForm = document.getElementById("login-form");
  const loginButton = document.getElementById("login-button");
  const loginMessage = document.getElementById("login-message");

  const LOGIN_RATE_LIMIT_KEY = "computerShopLoginRateLimit";
  const MAX_LOGIN_ATTEMPTS = 5;
  const LOGIN_WINDOW_MS = 30 * 60 * 1000;

  function getLoginRateLimit() {
    try {
      return JSON.parse(localStorage.getItem(LOGIN_RATE_LIMIT_KEY)) || {
        attempts: 0,
        firstAttemptAt: null,
        lockedUntil: null
      };
    } catch (error) {
      return {
        attempts: 0,
        firstAttemptAt: null,
        lockedUntil: null
      };
    }
  }

  function saveLoginRateLimit(rateLimit) {
    localStorage.setItem(LOGIN_RATE_LIMIT_KEY, JSON.stringify(rateLimit));
  }

  function clearLoginRateLimit() {
    localStorage.removeItem(LOGIN_RATE_LIMIT_KEY);
  }

  function getRemainingLockMinutes(lockedUntil) {
    const remainingMs = lockedUntil - Date.now();
    return Math.max(1, Math.ceil(remainingMs / 60000));
  }

  function isLoginLocked() {
    const rateLimit = getLoginRateLimit();

    if (!rateLimit.lockedUntil) {
      return false;
    }

    if (Date.now() >= rateLimit.lockedUntil) {
      clearLoginRateLimit();
      return false;
    }

    return true;
  }

  function recordLoginAttempt() {
    const now = Date.now();
    const rateLimit = getLoginRateLimit();

    if (!rateLimit.firstAttemptAt || now - rateLimit.firstAttemptAt > LOGIN_WINDOW_MS) {
      const freshRateLimit = {
        attempts: 1,
        firstAttemptAt: now,
        lockedUntil: null
      };

      saveLoginRateLimit(freshRateLimit);
      return freshRateLimit;
    }

    const updatedRateLimit = {
      ...rateLimit,
      attempts: Number(rateLimit.attempts || 0) + 1
    };

    if (updatedRateLimit.attempts >= MAX_LOGIN_ATTEMPTS) {
      updatedRateLimit.lockedUntil = now + LOGIN_WINDOW_MS;
    }

    saveLoginRateLimit(updatedRateLimit);
    return updatedRateLimit;
  }

  loginForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    if (isLoginLocked()) {
      const rateLimit = getLoginRateLimit();
      const minutesLeft = getRemainingLockMinutes(rateLimit.lockedUntil);
      loginMessage.textContent = `Too many login attempts. Please try again in ${minutesLeft} minute(s).`;
      return;
    }

    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;

    const rateLimit = recordLoginAttempt();

    if (rateLimit.lockedUntil) {
      loginMessage.textContent = "Too many login attempts. Please try again in 30 minutes.";
      return;
    }

    loginButton.disabled = true;
    loginButton.textContent = "Logging in...";
    loginMessage.textContent = "";

    const { error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      loginMessage.textContent = error.message;
      loginButton.disabled = false;
      loginButton.textContent = "Log In";
      return;
    }

    clearLoginRateLimit();
    window.location.href = "index.html";
  });
</script>

</body>
</html>
