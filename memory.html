<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="component-page">
  <section class="component-hero">
    <div class="component-hero-bg"></div>
    <div class="component-hero-overlay"></div>

    <div class="component-hero-content">
      <p class="component-hero-eyebrow">Components</p>
      <h1>Memory</h1>
      <p>Browse RAM kits selected for capacity, speed, stability, and clean build compatibility.</p>
    </div>
  </section>

  <section class="signature-layout">
    <aside class="filters-panel">
      <div class="filters-heading">Filter Memory</div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Brand</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Corsair</label>
          <label><input type="checkbox"> Kingston</label>
          <label><input type="checkbox"> G.Skill</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Capacity</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> 16GB</label>
          <label><input type="checkbox"> 32GB</label>
          <label><input type="checkbox"> 48GB</label>
          <label><input type="checkbox"> 64GB</label>
          <label><input type="checkbox"> 96GB</label>
          <label><input type="checkbox"> 128GB</label>
          <label><input type="checkbox"> 192GB</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Speed</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> 5600MT/s</label>
          <label><input type="checkbox"> 6000MT/s</label>
          <label><input type="checkbox"> 6400MT/s</label>
          <label><input type="checkbox"> 6800MT/s</label>
          <label><input type="checkbox"> 7000MT/s</label>
          <label><input type="checkbox"> 7200MT/s+</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Lighting</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> RGB</label>
          <label><input type="checkbox"> Non-RGB</label>
        </div>
      </div>
    </aside>

    <section class="signature-products">
      <div class="signature-builds-header">
        <p class="signature-builds-eyebrow">Available Components</p>
        <h2>Memory</h2>
      </div>

      <div class="signature-builds-grid"></div>
    </section>
  </section>
</main>

<script>
  document.querySelectorAll(".filter-toggle").forEach((button) => {
    button.addEventListener("click", () => {
      button.closest(".filter-item").classList.toggle("open");
    });
  });
</script>

</body>
</html>
