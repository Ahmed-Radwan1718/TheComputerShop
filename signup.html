<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body oncontextmenu="return false;">

<header class="site-header">
  <a href="index.html" class="site-header-logo">The Computer Shop</a>

  <nav class="site-header-nav" aria-label="Main navigation">
    <a href="signature-builds.html">Signature Builds</a>
    <a href="components.html">Components</a>
    <a href="consultation.html">Need a Custom PC?</a>
  </nav>

  <a href="cart.html" class="site-header-cart" aria-label="Cart">
    <img src="cart-icon.png" alt="Cart">
    <span class="nav-cart-count">0</span>
  </a>

  <button class="hamburger-toggle" type="button" aria-label="Open menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<main class="auth-page">
  <section class="auth-shell">
    <div class="auth-card">
      <p class="auth-eyebrow">Account</p>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Create an account to manage your details and future orders.</p>

      <form id="signup-form" class="auth-form">
        <label class="auth-field">
          <span class="auth-label">Full name</span>
          <input id="signup-name" class="auth-input" type="text" required>
        </label>

        <label class="auth-field">
          <span class="auth-label">Email</span>
          <input id="signup-email" class="auth-input" type="email" required autocomplete="email">
        </label>

        <label class="auth-field">
          <span class="auth-label">Phone Number</span>
          <input id="signup-phone" class="auth-input" type="tel" required autocomplete="tel">
        </label>

        <label class="auth-field">
          <span class="auth-label">Password</span>
          <input id="signup-password" class="auth-input" type="password" required autocomplete="new-password">
        </label>

        <button id="signup-button" class="auth-button" type="submit">
          Create Account
        </button>

        <p id="signup-message" class="auth-message"></p>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html">Log in</a>
      </p>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
  const signupForm = document.getElementById("signup-form");
  const signupButton = document.getElementById("signup-button");
  const signupMessage = document.getElementById("signup-message");

  signupForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    const fullName = document.getElementById("signup-name").value.trim();
    const email = document.getElementById("signup-email").value.trim();
    const phone = document.getElementById("signup-phone").value.trim();
    const password = document.getElementById("signup-password").value;

    signupButton.disabled = true;
    signupButton.textContent = "Creating account...";
    signupMessage.textContent = "";

    const { error } = await supabaseClient.auth.signUp({
      email: email,
      password: password,
      options: {
        emailRedirectTo: "https://the-computer-shop.vercel.app/auth-callback.html",
        data: {
          full_name: fullName,
          phone: phone
        }
      }
    });

    if (error) {
      signupMessage.textContent = error.message;
      signupButton.disabled = false;
      signupButton.textContent = "Create Account";
      return;
    }

    signupMessage.textContent = "Account created. Check your email to verify your account before logging in.";
    signupForm.reset();
    signupButton.disabled = false;
    signupButton.textContent = "Create Account";
  });
</script>

</body>
</html>
