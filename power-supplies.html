<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power Supplies - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="component-page">
  <section class="component-hero">
    <div class="component-hero-bg"></div>
    <div class="component-hero-overlay"></div>

    <div class="component-hero-content">
      <p class="component-hero-eyebrow">Components</p>
      <h1>Power Supplies</h1>
      <p>Browse PSUs selected for reliability, wattage headroom, efficiency, and clean cable management.</p>
    </div>
  </section>

  <section class="signature-layout">
    <aside class="filters-panel">
      <div class="filters-heading">Filter Power Supplies</div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Brand</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Gigabyte</label>
          <label><input type="checkbox"> ASUS</label>
          <label><input type="checkbox"> Corsair</label>
          <label><input type="checkbox"> Seasonic</label>
          <label><input type="checkbox"> Cooler Master</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Wattage</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> 750W</label>
          <label><input type="checkbox"> 850W</label>
          <label><input type="checkbox"> 1000W</label>
          <label><input type="checkbox"> 1200W</label>
          <label><input type="checkbox"> 1600W</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Efficiency</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> 80 Plus Bronze</label>
          <label><input type="checkbox"> 80 Plus Gold</label>
          <label><input type="checkbox"> 80 Plus Platinum</label>
          <label><input type="checkbox"> 80 Plus Titanium</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Modularity</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Fully Modular</label>
          <label><input type="checkbox"> Semi-Modular</label>
          <label><input type="checkbox"> Non-Modular</label>
        </div>
      </div>
    </aside>

    <section class="signature-products">
      <div class="signature-builds-header">
        <p class="signature-builds-eyebrow">Available Components</p>
        <h2>Power Supplies</h2>
      </div>

      <div class="signature-builds-grid"></div>
    </section>
  </section>
</main>

<script>
  document.querySelectorAll(".filter-toggle").forEach((button) => {
    button.addEventListener("click", () => {
      button.closest(".filter-item").classList.toggle("open");
    });
  });
</script>

</body>
</html>
