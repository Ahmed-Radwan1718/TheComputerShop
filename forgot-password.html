<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body oncontextmenu="return false;">

<header class="site-header">
  <a href="index.html" class="site-header-logo">The Computer Shop</a>

  <nav class="site-header-nav" aria-label="Main navigation">
    <a href="signature-builds.html">Signature Builds</a>
    <a href="components.html">Components</a>
    <a href="consultation.html">Need a Custom PC?</a>
  </nav>

  <a href="cart.html" class="site-header-cart" aria-label="Cart">
    <img src="cart-icon.png" alt="Cart">
    <span class="nav-cart-count">0</span>
  </a>

  <button class="hamburger-toggle" type="button" aria-label="Open menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<main class="auth-page">
  <section class="auth-shell">
    <div class="auth-card">
      <p class="auth-eyebrow">Account</p>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your email and we’ll send you a secure password reset link.</p>

      <form id="forgot-password-form" class="auth-form">
        <label class="auth-field">
          <span class="auth-label">Email</span>
          <input id="forgot-password-email" class="auth-input" type="email" required autocomplete="email">
        </label>

        <button id="forgot-password-button" class="auth-button" type="submit">
          Send Reset Link
        </button>

        <p id="forgot-password-message" class="auth-message"></p>
      </form>

      <p class="auth-switch">
        Remember your password?
        <a href="login.html">Log in</a>
      </p>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
  const forgotPasswordForm = document.getElementById("forgot-password-form");
  const forgotPasswordButton = document.getElementById("forgot-password-button");
  const forgotPasswordMessage = document.getElementById("forgot-password-message");

  forgotPasswordForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    const email = document.getElementById("forgot-password-email").value.trim();

    forgotPasswordButton.disabled = true;
    forgotPasswordButton.textContent = "Sending...";
    forgotPasswordMessage.textContent = "";

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: "https://the-computer-shop.vercel.app/reset-password.html"
    });

    if (error) {
      forgotPasswordMessage.textContent = error.message;
      forgotPasswordButton.disabled = false;
      forgotPasswordButton.textContent = "Send Reset Link";
      return;
    }

    forgotPasswordMessage.textContent = "If an account exists with this email, a password reset link has been sent.";
    forgotPasswordForm.reset();
    forgotPasswordButton.disabled = false;
    forgotPasswordButton.textContent = "Send Reset Link";
  });
</script>

</body>
</html>
