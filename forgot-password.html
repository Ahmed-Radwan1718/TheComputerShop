<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body oncontextmenu="return false;">

<div id="site-header-root"></div>
<script src="site-header.js"></script>

<main class="auth-page">
  <section class="auth-section">
    <div class="auth-section-inner">
      <div class="auth-section-header">
        <p class="auth-section-eyebrow">Account Recovery</p>
        <h1 class="auth-section-title">Forgot Password</h1>
        <p class="auth-section-intro">
          Enter your account email address and we will send you a password reset link.
        </p>
      </div>

      <div class="auth-panel">
        <form class="auth-form" id="forgot-password-form">
          <div class="auth-field">
            <label for="reset-email">Email Address</label>
            <input type="email" id="reset-email" autocomplete="email" required>
          </div>

          <button class="auth-button" type="submit" id="reset-submit">
            Send Reset Link
          </button>

          <p class="auth-message" id="reset-message" aria-live="polite"></p>
        </form>

        <div class="auth-panel-footer">
          <span>Remembered your password?</span>
          <a href="login.html">Log in</a>
        </div>

        <div class="auth-panel-footer">
          <span>Do not have an account?</span>
          <a href="signup.html">Create one</a>
        </div>
      </div>
    </div>
  </section>
</main>

<script type="module">
  import "./auth.js";

  const {
    auth,
    sendPasswordResetEmail
  } = window.tcsAuth;

  const forgotPasswordForm = document.getElementById("forgot-password-form");
  const resetButton = document.getElementById("reset-submit");
  const resetMessage = document.getElementById("reset-message");

  function showMessage(message, type) {
    resetMessage.textContent = message;
    resetMessage.className = "auth-message";

    if (type) {
      resetMessage.classList.add(type);
    }
  }

  function getReadableAuthError(error) {
    switch (error.code) {
      case "auth/invalid-email":
        return "Please enter a valid email address.";
      case "auth/user-not-found":
        return "No account was found with this email address.";
      case "auth/too-many-requests":
        return "Too many requests. Please wait before trying again.";
      case "auth/network-request-failed":
        return "Network error. Please check your connection and try again.";
      default:
        return "Something went wrong. Please try again.";
    }
  }

  forgotPasswordForm.addEventListener("submit", async function (event) {
    event.preventDefault();

    const email = document.getElementById("reset-email").value.trim();

    resetButton.disabled = true;
    resetButton.textContent = "Sending...";
    showMessage("", "");

    try {
      await sendPasswordResetEmail(auth, email);

      showMessage("Password reset email sent. Please check your inbox.", "success");
      forgotPasswordForm.reset();
    } catch (error) {
      showMessage(getReadableAuthError(error), "error");
    } finally {
      resetButton.disabled = false;
      resetButton.textContent = "Send Reset Link";
    }
  });
</script>

<script>
  document.addEventListener("keydown", function (event) {
    if (
      event.key === "F12" ||
      (event.ctrlKey && event.shiftKey && ["I", "J", "C"].includes(event.key.toUpperCase())) ||
      (event.ctrlKey && event.key.toUpperCase() === "U") ||
      (event.metaKey && event.altKey && ["I", "J", "C"].includes(event.key.toUpperCase()))
    ) {
      event.preventDefault();
      return false;
    }
  });
</script>

</body>
</html>
