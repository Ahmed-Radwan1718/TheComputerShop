<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cases - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="component-page">
  <section class="component-hero">
    <div class="component-hero-bg"></div>
    <div class="component-hero-overlay"></div>

    <div class="component-hero-content">
      <p class="component-hero-eyebrow">Components</p>
      <h1>Cases</h1>
      <p>Browse cases selected for airflow, build quality, hardware clearance, and clean visual direction.</p>
    </div>
  </section>

  <section class="signature-layout">
    <aside class="filters-panel">
      <div class="filters-heading">Filter Cases</div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Brand</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Lian Li</label>
          <label><input type="checkbox"> ASUS</label>
          <label><input type="checkbox"> Corsair</label>
          <label><input type="checkbox"> Gigabyte</label>
          <label><input type="checkbox"> Fractal</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Case Size</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Mid Tower</label>
          <label><input type="checkbox"> Full Tower</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Color</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Black</label>
          <label><input type="checkbox"> White</label>
          <label><input type="checkbox"> Grey</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Style</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Airflow</label>
          <label><input type="checkbox"> Panoramic Glass</label>
          <label><input type="checkbox"> Minimal</label>
        </div>
      </div>
    </aside>

    <section class="signature-products">
      <div class="signature-builds-header">
        <p class="signature-builds-eyebrow">Available Components</p>
        <h2>Cases</h2>
      </div>

      <div class="signature-builds-grid"></div>
    </section>
  </section>
</main>

<script>
  document.querySelectorAll(".filter-toggle").forEach((button) => {
    button.addEventListener("click", () => {
      button.closest(".filter-item").classList.toggle("open");
    });
  });
</script>

</body>
</html>
