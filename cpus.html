<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPUs - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="component-page">
  <section class="component-hero">
    <div class="component-hero-bg"></div>
    <div class="component-hero-overlay"></div>

    <div class="component-hero-content">
      <p class="component-hero-eyebrow">Components</p>
      <h1>CPUs</h1>
      <p>Browse processors selected for balanced gaming, productivity, and workstation builds.</p>
    </div>
  </section>

  <section class="signature-layout">
    <aside class="filters-panel">
      <div class="filters-heading">Filter CPUs</div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Brand</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Intel</label>
          <label><input type="checkbox"> AMD</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Processor Family</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Intel Core Ultra 5</label>
          <label><input type="checkbox"> Intel Core Ultra 7</label>
          <label><input type="checkbox"> Intel Core Ultra 9</label>
          <label><input type="checkbox"> Ryzen 5</label>
          <label><input type="checkbox"> Ryzen 7</label>
          <label><input type="checkbox"> Ryzen 9</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Socket</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> LGA 1851</label>
          <label><input type="checkbox"> AM5</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Core Count</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> 6 Cores</label>
          <label><input type="checkbox"> 8 Cores</label>
          <label><input type="checkbox"> 12 Cores</label>
          <label><input type="checkbox"> 14 Cores</label>
          <label><input type="checkbox"> 16 Cores</label>
          <label><input type="checkbox"> 20 Cores</label>
          <label><input type="checkbox"> 24 Cores</label>
        </div>
      </div>
    </aside>

    <section class="signature-products">
      <div class="signature-builds-header">
        <p class="signature-builds-eyebrow">Available Components</p>
        <h2>CPUs</h2>
      </div>

      <div class="signature-builds-grid"></div>
    </section>
  </section>
</main>

<script>
  document.querySelectorAll(".filter-toggle").forEach((button) => {
    button.addEventListener("click", () => {
      button.closest(".filter-item").classList.toggle("open");
    });
  });
</script>

</body>
</html>
