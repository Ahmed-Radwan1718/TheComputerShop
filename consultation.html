  <script>
    document.querySelectorAll("[data-custom-select]").forEach((dropdown) => {
      const trigger = dropdown.querySelector(".custom-select-trigger");
      const valueText = dropdown.querySelector(".custom-select-value");
      const hiddenInput = dropdown.querySelector("input[type='hidden']");
      const options = dropdown.querySelectorAll(".custom-select-option");

      trigger.addEventListener("click", () => {
        document.querySelectorAll("[data-custom-select]").forEach((otherDropdown) => {
          if (otherDropdown !== dropdown) {
            otherDropdown.classList.remove("open");
          }
        });

        dropdown.classList.toggle("open");
      });

      options.forEach((option) => {
        option.addEventListener("click", () => {
          options.forEach((item) => item.classList.remove("active"));
          option.classList.add("active");

          valueText.textContent = option.textContent;
          hiddenInput.value = option.dataset.value;

          dropdown.classList.remove("open");
          dropdown.classList.remove("invalid");
        });
      });
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest("[data-custom-select]")) {
        document.querySelectorAll("[data-custom-select]").forEach((dropdown) => {
          dropdown.classList.remove("open");
        });
      }
    });

    const consultationForm = document.querySelector(".consultation-form");
    const consultationSuccess = document.getElementById("consultation-success");

    async function submitConsultationFormForSignedInUser(form, event) {
      event.preventDefault();

      const authMessage = form.querySelector("[data-consultation-auth-message]");

      if (authMessage) {
        authMessage.textContent = "";
      }

      let valid = true;

      form.querySelectorAll("[data-required-select='true']").forEach((input) => {
        if (!input.value) {
          input.closest("[data-custom-select]").classList.add("invalid");
          valid = false;
        }
      });

      if (!valid) {
        return;
      }

      const submitButton = form.querySelector("button[type='submit']");
      const originalButtonText = submitButton ? submitButton.textContent : "";

      if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = "Submitting...";
      }

      const payload = {};

      new FormData(form).forEach((value, key) => {
        payload[key] = typeof value === "string" ? value.trim() : "";
      });

      try {
        const response = await fetch(form.action, {
          method: "POST",
          credentials: "same-origin",
          cache: "no-store",
          headers: {
            "Accept": "application/json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => {
          return {};
        });

        if (response.status === 401 || response.status === 403) {
          if (authMessage) {
            authMessage.textContent = "You need to be logged in to submit a consultation request.";
          }

          return;
        }

        if (!response.ok || !data.success) {
          throw new Error(data.error || "Could not submit consultation request.");
        }

        form.reset();

        form.querySelectorAll("[data-custom-select]").forEach((dropdown) => {
          dropdown.classList.remove("open", "invalid");

          const hiddenInput = dropdown.querySelector("input[type='hidden']");
          const valueText = dropdown.querySelector(".custom-select-value");

          if (hiddenInput) {
            hiddenInput.value = "";
          }

          if (valueText) {
            valueText.textContent = "Select one";
          }

          dropdown.querySelectorAll(".custom-select-option").forEach((option) => {
            option.classList.remove("active");
          });
        });

        if (consultationSuccess) {
          consultationSuccess.hidden = false;
          consultationSuccess.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      } catch (error) {
        if (authMessage) {
          authMessage.textContent = error.message || "Could not submit consultation request.";
        }
      } finally {
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = originalButtonText;
        }
      }
    }

    if (consultationForm) {
      consultationForm.addEventListener("submit", (event) => {
        submitConsultationFormForSignedInUser(consultationForm, event);
      });
    }
  </script>

<script>
  document.addEventListener("keydown", function (event) {
    if (
      event.key === "F12" ||
      (event.ctrlKey && event.shiftKey && ["I", "J", "C"].includes(event.key.toUpperCase())) ||
      (event.ctrlKey && event.key.toUpperCase() === "U") ||
      (event.metaKey && event.altKey && ["I", "J", "C"].includes(event.key.toUpperCase()))
    ) {
      event.preventDefault();
      return false;
    }
  });
</script>
