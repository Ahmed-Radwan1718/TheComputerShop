.components-hub-page {
  min-height: 100vh;
  background: #2a2b2a;

.components-page-grid-section {

  align-items: center;
  justify-content: center;
}

.components-page-grid {

.components-page-grid-card,

  flex-direction: column;

  font-weight: 700;
  letter-spacing: 0.09em;
  text-align: left;
  text-transform: uppercase;
  text-decoration: none;
  transition: opacity 0.22s ease, transform 0.22s ease;
}

.components-page-grid-card::before {
  content: "";
  width: 100%;
  min-height: 230px;
  border-radius: 18px;
  background-image:
    linear-gradient(rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0.32)),
    var(--component-card-image);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-color: transparent;
  transition:
    opacity 0.22s ease,
    transform 0.22s ease;
}

.components-page-grid-card:hover {
  opacity: 0.88;
  transform: translateY(-2px);
}

.components-page-grid-card:hover::before {
  background-color: transparent;
  box-shadow: none;
}

.components-hub-section {
  min-height: calc(100vh - 104px);
  padding: 72px 60px 96px;
}

.components-hub-inner {

.components-hub-header {

}

.components-hub-eyebrow {

  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.components-hub-header h1 {
  margin-bottom: 14px;
  color: white;
  font-size: 36px;
  font-weight: 700;
  line-height: 1.12;
  letter-spacing: -0.03em;
}

.components-hub-header p {
  color: rgba(255, 255, 255, 0.64);
  font-size: 15px;
  line-height: 1.7;
}

.components-hub-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 24px;
}

.components-hub-card,
.components-hub-card:visited {
  border-radius: 24px;
  overflow: hidden;
  color: white;
  text-decoration: none;
  display: block;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.components-hub-card:hover {
  opacity: 0.84;
}

.components-hub-card:active {
  transform: translateY(1px);
}

.components-hub-image-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.components-hub-image-frame::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.18));
  z-index: 1;
}

.components-hub-image-frame img {
  width: 92%;

}

.components-hub-card h3 {

body:has(.components-hub-page) .site-header {

<script>
  document.addEventListener("keydown", function (event) {
    if (
      event.key === "F12" ||
      (event.ctrlKey && event.shiftKey && ["I", "J", "C"].includes(event.key.toUpperCase())) ||
      (event.ctrlKey && event.key.toUpperCase() === "U") ||
      (event.metaKey && event.altKey && ["I", "J", "C"].includes(event.key.toUpperCase()))
    ) {
      event.preventDefault();
      return false;
    }
  });
</script>
