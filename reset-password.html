<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body oncontextmenu="return false;">

<header class="site-header">
  <a href="index.html" class="site-header-logo">The Computer Shop</a>

  <nav class="site-header-nav" aria-label="Main navigation">
    <a href="signature-builds.html">Signature Builds</a>
    <a href="components.html">Components</a>
    <a href="consultation.html">Need a Custom PC?</a>
  </nav>

  <a href="cart.html" class="site-header-cart" aria-label="Cart">
    <img src="cart-icon.png" alt="Cart">
    <span class="nav-cart-count">0</span>
  </a>

  <button class="hamburger-toggle" type="button" aria-label="Open menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<main style="min-height: 100vh; padding: 150px 24px 80px; background: #000; color: white;">
  <section style="width: 100%; max-width: 440px; margin: 0 auto; padding: 34px; border-radius: 24px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);">
    <p style="margin-bottom: 14px; color: rgba(255,255,255,0.58); font-size: 13px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;">Account</p>
    <h1 style="margin-bottom: 12px; font-size: 34px; line-height: 1.1;">Set New Password</h1>
    <p style="margin-bottom: 28px; color: rgba(255,255,255,0.68); line-height: 1.7;">Enter a new password for your account.</p>

    <form id="reset-password-form">
      <label style="display: block; margin-bottom: 16px;">
        <span style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.75); font-size: 14px;">New password</span>
        <input id="reset-password-new" type="password" required autocomplete="new-password" style="width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.16); background: rgba(0,0,0,0.45); color: white; font-size: 15px;">
      </label>

      <label style="display: block; margin-bottom: 18px;">
        <span style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.75); font-size: 14px;">Confirm new password</span>
        <input id="reset-password-confirm" type="password" required autocomplete="new-password" style="width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.16); background: rgba(0,0,0,0.45); color: white; font-size: 15px;">
      </label>

      <button id="reset-password-button" type="submit" style="width: 100%; padding: 15px 18px; border: 0; border-radius: 999px; background: white; color: black; font-size: 15px; font-weight: 800; cursor: pointer;">
        Update Password
      </button>

      <p id="reset-password-message" style="min-height: 24px; margin-top: 18px; color: rgba(255,255,255,0.72); font-size: 14px; line-height: 1.6;"></p>
    </form>

    <p style="margin-top: 22px; color: rgba(255,255,255,0.62); font-size: 14px;">
      Back to
      <a href="login.html" style="color: white;">log in</a>
    </p>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
  const resetPasswordForm = document.getElementById("reset-password-form");
  const resetPasswordButton = document.getElementById("reset-password-button");
  const resetPasswordMessage = document.getElementById("reset-password-message");

  async function checkRecoverySession() {
    const { data } = await supabaseClient.auth.getSession();

    if (!data.session) {
      resetPasswordMessage.textContent = "Open this page from the password reset email link before setting a new password.";
    }
  }

  resetPasswordForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    const newPassword = document.getElementById("reset-password-new").value;
    const confirmPassword = document.getElementById("reset-password-confirm").value;

    if (newPassword !== confirmPassword) {
      resetPasswordMessage.textContent = "Passwords do not match.";
      return;
    }

    resetPasswordButton.disabled = true;
    resetPasswordButton.textContent = "Updating...";
    resetPasswordMessage.textContent = "";

    const { error } = await supabaseClient.auth.updateUser({
      password: newPassword
    });

    if (error) {
      resetPasswordMessage.textContent = error.message;
      resetPasswordButton.disabled = false;
      resetPasswordButton.textContent = "Update Password";
      return;
    }

    resetPasswordMessage.textContent = "Password updated successfully. Redirecting to login...";

    await supabaseClient.auth.signOut();

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1400);
  });

  checkRecoverySession();
</script>

</body>
</html>
