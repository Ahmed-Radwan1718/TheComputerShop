<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graphics Cards - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="component-page">
  <section class="component-hero">
    <div class="component-hero-bg"></div>
    <div class="component-hero-overlay"></div>

    <div class="component-hero-content">
      <p class="component-hero-eyebrow">Components</p>
      <h1>Graphics Cards</h1>
      <p>Browse GPUs selected for gaming, rendering, streaming, and high-performance visual workloads.</p>
    </div>
  </section>

  <section class="signature-layout">
    <aside class="filters-panel">
      <div class="filters-heading">Filter GPUs</div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Brand</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> Gigabyte</label>
          <label><input type="checkbox"> ASUS</label>
          <label><input type="checkbox"> MSI</label>
          <label><input type="checkbox"> Zotac</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>GPU Model</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> RTX 5050</label>
          <label><input type="checkbox"> RTX 5060</label>
          <label><input type="checkbox"> RTX 5060 Ti</label>
          <label><input type="checkbox"> RTX 5070</label>
          <label><input type="checkbox"> RTX 5070 Ti</label>
          <label><input type="checkbox"> RTX 5080</label>
          <label><input type="checkbox"> RTX 5090</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>VRAM</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> 8GB</label>
          <label><input type="checkbox"> 12GB</label>
          <label><input type="checkbox"> 16GB</label>
          <label><input type="checkbox"> 24GB</label>
          <label><input type="checkbox"> 32GB</label>
        </div>
      </div>
    </aside>

    <section class="signature-products">
      <div class="signature-builds-header">
        <p class="signature-builds-eyebrow">Available Components</p>
        <h2>Graphics Cards</h2>
      </div>

      <div class="signature-builds-grid"></div>
    </section>
  </section>
</main>

<script>
  document.querySelectorAll(".filter-toggle").forEach((button) => {
    button.addEventListener("click", () => {
      button.closest(".filter-item").classList.toggle("open");
    });
  });
</script>

</body>
</html>
