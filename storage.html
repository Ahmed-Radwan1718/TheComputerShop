<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storage - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="component-page">
  <section class="component-hero">
    <div class="component-hero-bg"></div>
    <div class="component-hero-overlay"></div>

    <div class="component-hero-content">
      <p class="component-hero-eyebrow">Components</p>
      <h1>Storage</h1>
      <p>Browse storage options selected for speed, reliability, capacity, and clean system organization.</p>
    </div>
  </section>

  <section class="signature-layout">
    <aside class="filters-panel">
      <div class="filters-heading">Filter Storage</div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Storage Type</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> NVMe SSD</label>
          <label><input type="checkbox"> SATA SSD</label>
          <label><input type="checkbox"> HDD</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Capacity</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> 500GB</label>
          <label><input type="checkbox"> 1TB</label>
          <label><input type="checkbox"> 2TB</label>
          <label><input type="checkbox"> 4TB</label>
          <label><input type="checkbox"> 8TB</label>
        </div>
      </div>

      <div class="filter-item">
        <button class="filter-toggle" type="button"><span>Interface</span><span class="chevron">⌄</span></button>
        <div class="filter-content">
          <label><input type="checkbox"> PCIe 4.0</label>
          <label><input type="checkbox"> PCIe 5.0</label>
          <label><input type="checkbox"> SATA</label>
        </div>
      </div>
    </aside>

    <section class="signature-products">
      <div class="signature-builds-header">
        <p class="signature-builds-eyebrow">Available Components</p>
        <h2>Storage</h2>
      </div>

      <div class="signature-builds-grid"></div>
    </section>
  </section>
</main>

<script>
  document.querySelectorAll(".filter-toggle").forEach((button) => {
    button.addEventListener("click", () => {
      button.closest(".filter-item").classList.toggle("open");
    });
  });
</script>

</body>
</html>
