<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart - The Computer Shop</title>
  <link rel="stylesheet" href="style.css" />

  <style>
.cart-page {
  min-height: 100vh;
  background: #2a2b2a;
  padding-top: 140px;
}

.cart-layout {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 60px 80px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  column-gap: 140px;
  row-gap: 0;
  align-items: start;
}

.cart-panel-eyebrow {
  margin-bottom: 12px;
  color: rgba(255, 255, 255, 0.58);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.cart-header h1 {
  margin-bottom: 12px;
  color: white;
  font-size: 46px;
  font-weight: 700;
  line-height: 1.08;
  text-transform: uppercase;
}

.cart-order-note {
  max-width: 720px;
  margin-bottom: 30px;
  color: rgba(255, 255, 255, 0.68);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.6;
}

.cart-items {
  display: grid;
  gap: 18px;
}

.cart-items:empty {
  display: none;
}

.cart-item {
  display: grid;
  grid-template-columns: 118px minmax(0, 1fr) auto;
  gap: 22px;
  align-items: center;
  padding: 34px;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.105);
  background: rgba(24, 25, 24, 0.72);
  box-shadow: 0 22px 55px rgba(0, 0, 0, 0.22);
  content-visibility: auto;
  contain-intrinsic-size: 190px;
}

.cart-item:last-child {
  border-bottom: 1px solid rgba(255, 255, 255, 0.105);
}

.cart-item-image-frame {
  width: 118px;
  aspect-ratio: 75 / 56;
  border-radius: 16px;
  overflow: hidden;
  display: block;
  background: rgba(255, 255, 255, 0.045);
}

.cart-item-image-frame img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

.cart-item-info {
  min-width: 0;
}

.cart-item-title,
.cart-item-title:visited {
  display: inline-block;
  margin-bottom: 12px;
  color: white;
  font-size: 32px;
  font-weight: 700;
  line-height: 1.12;
  text-transform: uppercase;
  text-decoration: none;
}

.cart-item-info p {
  margin-bottom: 8px;
  color: rgba(255, 255, 255, 0.66);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.75;
}

.cart-item-info span {
  color: rgba(255, 255, 255, 0.58);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.cart-item-side {
  display: grid;
  gap: 14px;
  justify-items: end;
  text-align: right;
}

.cart-summary {
  margin-top: 0;
  padding: 28px;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.105);
  background: rgba(24, 25, 24, 0.72);
  box-shadow: 0 22px 55px rgba(0, 0, 0, 0.22);
  position: relative;
  top: 0;
  box-sizing: border-box;
  contain: layout paint style;
}

@media (max-width: 1100px) {
  .cart-layout {
    grid-template-columns: 1fr;
    gap: 40px;
    padding: 0 44px 76px;
  }

  .cart-summary {
    top: 0;
    max-width: none;
  }
}

@media (max-width: 900px) {
  .cart-page {
    padding-top: 92px;
  }
}

@media (max-width: 700px) {
  .cart-page {
    padding-top: 96px;
  }

  .cart-header h1 {
    font-size: 38px;
  }

  .cart-order-note {
    font-size: 15px;
    line-height: 1.7;
  }

  .cart-item {
    grid-template-columns: 92px minmax(0, 1fr);
    gap: 16px;
    padding: 24px;
  }

  .cart-item-image-frame {
    width: 92px;
  }

  .cart-item-title,
  .cart-item-title:visited {
    font-size: 24px;
    line-height: 1.16;
  }

  .cart-item-side {
    grid-column: 1 / -1;
    justify-items: start;
    text-align: left;
  }
}

@media (max-width: 620px) {
  .cart-empty-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .cart-empty-button,
  .cart-empty-link {
    width: 100%;
    justify-content: center;
    text-align: center;
  }
}

@media (max-width: 430px) {
  .cart-page {
    padding-top: 82px;
  }

  .cart-layout {
    padding-left: 18px;
    padding-right: 18px;
  }

  .cart-item {
    grid-template-columns: 82px minmax(0, 1fr);
    gap: 14px;
  }

  .cart-item-image-frame {
    width: 82px;
  }
}
  </style>
</head>
<body>

<div id="site-header-root"></div>
<script src="site-header.js"></script>

  <main class="cart-page">
    <section class="cart-layout">
      <div class="cart-main">
        <div class="cart-header">
          <h1>Your Cart</h1>
          <p class="cart-order-note">
            Review your selected parts and builds before sending an order request.
          </p>
        </div>

        <div id="cart-items" class="cart-items"></div>

        <div id="cart-empty" class="cart-empty">
          <div class="cart-empty-panel">
            <div class="cart-empty-heading-row">
              <div class="cart-empty-icon">
                <img src="cart-icon.png" alt="" aria-hidden="true">
              </div>

              <div>
                <p class="cart-empty-eyebrow">Build Queue</p>
                <h2>Your cart is empty</h2>
                <p>Start with a ready build or request a custom PC tailored to your setup.</p>
              </div>
            </div>

            <div class="cart-empty-actions">
              <a href="signature-builds.html" class="cart-empty-button">Browse Signature Builds</a>
              <a href="consultation.html" class="cart-empty-link">Request Custom PC</a>
            </div>
          </div>
        </div>
      </div>

      <aside id="cart-summary" class="cart-summary">
        <h2 class="cart-summary-title">Order summary</h2>

        <div class="cart-summary-total-row">
          <span>Total:</span>
          <strong id="cart-total">0 EGP</strong>
        </div>

<button class="cart-checkout-button" type="button" id="submit-order-request-button">
  Continue to Checkout
</button>

        <p class="cart-order-submit-message" id="cart-order-submit-message" aria-live="polite"></p>
      </aside>
    </section>
  </main>

  <div id="site-footer-root"></div>
  <script src="site-footer.js"></script>


<script>
  const cartItems = document.getElementById("cart-items");
  const cartEmpty = document.getElementById("cart-empty");
  const cartSummary = document.getElementById("cart-summary");
  const cartTotal = document.getElementById("cart-total");
  const submitOrderRequestButton = document.getElementById("submit-order-request-button");
  const cartOrderSubmitMessage = document.getElementById("cart-order-submit-message");

  let currentCartUser = null;
  let cloudCartItems = [];

  function getLocalCart() {
    return JSON.parse(localStorage.getItem("computerShopCart")) || [];
  }

  function saveLocalCart(cart) {
    localStorage.setItem("computerShopCart", JSON.stringify(cart));
    renderCart(cart);
  }

  function updateCartCount(cart) {
    const totalQuantity = cart.reduce(function (total, item) {
      return total + Number(item.quantity || 0);
    }, 0);

    document.querySelectorAll(".nav-cart-count").forEach(function (count) {
      count.textContent = totalQuantity;
      count.style.display = totalQuantity > 0 ? "block" : "none";
    });
  }

  function escapeHtml(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function renderCart(cart) {
    if (!cartItems || !cartEmpty || !cartSummary || !cartTotal) {
      return;
    }

    updateCartCount(cart);
    cartItems.innerHTML = "";

    const cartLayout = cartEmpty.closest(".cart-layout");
    const cartHeader = document.querySelector(".cart-header");

    if (cartLayout) {
      cartLayout.classList.remove("cart-layout-is-empty");
    }

    if (cart.length === 0) {
      if (cartHeader) {
        cartHeader.style.display = "none";
      }

      cartEmpty.style.display = "block";
      cartSummary.style.display = "block";
      cartTotal.textContent = "0 EGP";
      return;
    }

    if (cartHeader) {
      cartHeader.style.display = "";
    }

    cartEmpty.style.display = "none";
    cartSummary.style.display = "block";

    cart.forEach(function (item) {
      const cartItem = document.createElement("article");
      cartItem.className = "cart-item";

      cartItem.innerHTML = `
        <a href="${escapeHtml(item.url)}" class="cart-item-image-frame">
          <img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name)}">
        </a>

        <div class="cart-item-info">
          <a href="${escapeHtml(item.url)}" class="cart-item-title">${escapeHtml(item.name)}</a>
          <p>${escapeHtml(item.specsLine)}</p>
          <span>Quantity: ${escapeHtml(item.quantity)}</span>
        </div>

        <div class="cart-item-side">
          <strong>${escapeHtml(item.priceText)}</strong>
          <button class="cart-item-remove" type="button" data-id="${escapeHtml(item.id)}">
            Remove
          </button>
        </div>
      `;

      cartItems.appendChild(cartItem);
    });

    const hasKnownPrices = cart.every(function (item) {
      return typeof item.priceNumber === "number";
    });

    if (hasKnownPrices) {
      const total = cart.reduce(function (sum, item) {
        return sum + Number(item.priceNumber || 0) * Number(item.quantity || 0);
      }, 0);

      cartTotal.textContent = total.toLocaleString() + " EGP";
    } else {
      cartTotal.textContent = "Final price to be confirmed";
    }
  }

  async function mergeLocalCartToCloud(user) {
    const localCart = getLocalCart();

    if (!user || !localCart.length) {
      return;
    }

    await Promise.all(localCart.map(async function (item) {
      const itemRef = doc(db, "users", user.uid, "cartItems", item.id);
      const existingDoc = await getDoc(itemRef);
      const existingQuantity = existingDoc.exists() ? Number(existingDoc.data().quantity || 0) : 0;

      await setDoc(itemRef, {
        ...item,
        quantity: existingQuantity + Number(item.quantity || 1),
        updatedAt: serverTimestamp(),
        addedAt: existingDoc.exists() && existingDoc.data().addedAt ? existingDoc.data().addedAt : serverTimestamp()
      }, { merge: true });
    }));

    localStorage.removeItem("computerShopCart");
  }

  function showCartOrderMessage(message, type) {
    if (!cartOrderSubmitMessage) {
      return;
    }

    cartOrderSubmitMessage.textContent = message;
    cartOrderSubmitMessage.className = "cart-order-submit-message";

    if (type) {
      cartOrderSubmitMessage.classList.add(type);
    }
  }

  function createOrderNumber() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    const randomPart = Math.random().toString(36).slice(2, 6).toUpperCase();

    return "TCS-" + year + month + day + "-" + randomPart;
  }

  function getCurrentCartItems() {
    return currentCartUser ? cloudCartItems : getLocalCart();
  }

  function getCartTotalValue(cart) {
    const hasKnownPrices = cart.every(function (item) {
      return typeof item.priceNumber === "number";
    });

    if (!hasKnownPrices) {
      return null;
    }

    return cart.reduce(function (sum, item) {
      return sum + Number(item.priceNumber || 0) * Number(item.quantity || 0);
    }, 0);
  }

  async function clearCurrentCart() {
    if (currentCartUser) {
      await Promise.all(cloudCartItems.map(function (item) {
        return deleteDoc(doc(db, "users", currentCartUser.uid, "cartItems", item.id));
      }));

      return;
    }

    localStorage.removeItem("computerShopCart");
    renderCart([]);
  }

  async function submitOrderRequest() {
    if (!currentCartUser) {
      window.location.href = "login.html";
      return;
    }

    const cart = getCurrentCartItems();

    if (!cart.length) {
      showCartOrderMessage("Your cart is empty.", "error");
      return;
    }

    const confirmed = window.confirm("Submit this cart as an order request? We will review availability and final pricing before confirming.");

    if (!confirmed) {
      return;
    }

    submitOrderRequestButton.disabled = true;
    submitOrderRequestButton.textContent = "Submitting...";
    showCartOrderMessage("", "");

    try {
      const userDoc = await getDoc(doc(db, "users", currentCartUser.uid));
      const userData = userDoc.exists() ? userDoc.data() : {};
      const totalValue = getCartTotalValue(cart);

      await addDoc(collection(db, "orders"), {
        orderNumber: createOrderNumber(),
        userId: currentCartUser.uid,
        userName: userData.fullName || currentCartUser.displayName || "Customer",
        userEmail: currentCartUser.email || "",
        phone: userData.phone || "",
        addressType: userData.addressType || "",
        buildingName: userData.buildingName || "",
        apartmentNumber: userData.apartmentNumber || "",
        floorNumber: userData.floorNumber || "",
        houseNumber: userData.houseNumber || "",
        officeName: userData.officeName || "",
        companyName: userData.companyName || "",
        streetName: userData.streetName || "",
        additionalInfo: userData.additionalInfo || "",
        items: cart.map(function (item) {
          return {
            id: item.id || "",
            name: item.name || "Product",
            category: item.category || "Product",
            specsLine: item.specsLine || "",
            priceText: item.priceText || "Price pending confirmation",
            priceNumber: typeof item.priceNumber === "number" ? item.priceNumber : null,
            image: item.image || "",
            url: item.url || "",
            quantity: Number(item.quantity || 1)
          };
        }),
        itemCount: cart.reduce(function (total, item) {
          return total + Number(item.quantity || 0);
        }, 0),
        totalValue: totalValue,
        totalText: totalValue === null ? "Final price to be confirmed" : totalValue.toLocaleString() + " EGP",
        status: "submitted",
        paymentStatus: "not_paid",
        customerNote: "",
        adminNote: "",
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      await clearCurrentCart();

      showCartOrderMessage("Order request submitted. You can track it from your Order History.", "success");
      submitOrderRequestButton.textContent = "Submitted";

      setTimeout(function () {
        window.location.href = "accounts.html";
      }, 1200);
    } catch (error) {
      showCartOrderMessage("Could not submit your order request. Please try again.", "error");
      submitOrderRequestButton.disabled = false;
      submitOrderRequestButton.textContent = "Submit Order Request";
    }
  }

  async function removeCartItem(itemId) {
    const response = await fetch("/api/cart", {
      method: "DELETE",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id: itemId })
    });

    const data = await response.json().catch(function () {
      return {};
    });

    if (!response.ok) {
      throw new Error(data.error || "Could not remove this item.");
    }

    cloudCartItems = Array.isArray(data.items) ? data.items : [];
    renderCart(cloudCartItems);

    if (typeof window.tcsRefreshCartCount === "function") {
      window.tcsRefreshCartCount();
    }
  }

  cartItems.addEventListener("click", async function (event) {
    const removeButton = event.target.closest(".cart-item-remove");

    if (!removeButton) {
      return;
    }

    removeButton.disabled = true;
    removeButton.textContent = "Removing...";

    try {
      await removeCartItem(removeButton.dataset.id);
    } catch (error) {
      removeButton.disabled = false;
      removeButton.textContent = "Remove";
    }
  });

  if (submitOrderRequestButton) {
    submitOrderRequestButton.addEventListener("click", function () {
      const cart = getCurrentCartItems();

      if (!cart.length) {
        showCartOrderMessage("Your cart is empty.", "error");
        return;
      }

      if (!currentCartUser) {
        localStorage.setItem("tcs-login-redirect", "checkout.html");
        window.location.href = "login.html";
        return;
      }

      window.location.href = "checkout.html";
    });
  }

  async function loadServerCartPage() {
    try {
      const accountResponse = await fetch("/api/me", {
        method: "GET",
        credentials: "same-origin",
        headers: {
          "Accept": "application/json"
        }
      });

      const accountData = await accountResponse.json().catch(function () {
        return {};
      });

      if (!accountResponse.ok || !accountData.signedIn || !accountData.user) {
        currentCartUser = null;
        localStorage.setItem("tcs-login-redirect", "cart.html");
        renderCart([]);
        window.location.href = "login.html";
        return;
      }

      currentCartUser = accountData.user;

      const cartResponse = await fetch("/api/cart", {
        method: "GET",
        credentials: "same-origin",
        headers: {
          "Accept": "application/json"
        }
      });

      const cartData = await cartResponse.json().catch(function () {
        return {};
      });

      if (!cartResponse.ok || !Array.isArray(cartData.items)) {
        throw new Error(cartData.error || "Could not load your cart.");
      }

      cloudCartItems = cartData.items;
      renderCart(cloudCartItems);
    } catch (error) {
      cloudCartItems = [];
      renderCart([]);
      showCartOrderMessage(error.message || "Could not load your cart. Please refresh and try again.", "error");
    }
  }

  loadServerCartPage();
</script>
<script>
  document.addEventListener("keydown", function (event) {
    if (
      event.key === "F12" ||
      (event.ctrlKey && event.shiftKey && ["I", "J", "C"].includes(event.key.toUpperCase())) ||
      (event.ctrlKey && event.key.toUpperCase() === "U") ||
      (event.metaKey && event.altKey && ["I", "J", "C"].includes(event.key.toUpperCase()))
    ) {
      event.preventDefault();
      return false;
    }
  });
</script>

</body>
</html>
